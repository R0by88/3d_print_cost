<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Print Cost</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Calcolo Costo Stampa 3D</h1>

<div class="box">

<label>Nome stampa</label>
<input id="nome">

<label>Stampante</label>
<select id="stampante"></select>

<label>Tempo stampa (ore)</label>
<input id="tempo" type="number">

<label>Filamento (g)</label>
<input id="filamento" type="number">

<label>Accessori (€)</label>
<input id="accessori" type="number">

<label>Pezzi venduti</label>
<input id="pezzi" type="number">

<button onclick="salva()">SALVA STAMPA</button>

</div>

<script src="script.js"></script>

</body>
</html>
