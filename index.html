<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D PRINT COST</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="menuPrincipale" class="container">

<h1>3D PRINT COST</h1>

<button onclick="apriMenu('nuovaStampa')">NUOVA STAMPA</button>

<button onclick="apriMenu('storico')">STORICO</button>

<button onclick="apriMenu('stampanti')">STAMPANTI</button>

<button onclick="apriMenu('filamenti')">FILAMENTI</button>

</div>


<div id="nuovaStampa" class="container hidden">

<button onclick="tornaMenu()">⬅ INDIETRO</button>

<h2>Nuova Stampa</h2>

<label>Nome stampa</label>
<input id="nomeStampa">

<label>Stampante</label>
<select id="stampante"></select>

<div class="tempo">

<label>Tempo stampa</label>

<input id="ore" type="number" placeholder="HH" max="99">

<span>:</span>

<input id="minuti" type="number" placeholder="MM" max="59">

</div>

<h3>Filamenti</h3>

<div id="listaFilamenti"></div>

<button onclick="aggiungiFilamento()">+ AGGIUNGI FILAMENTO</button>

</div>


<div id="stampanti" class="container hidden">

<button onclick="tornaMenu()">⬅ INDIETRO</button>

<h2>Stampanti</h2>

</div>


<div id="filamenti" class="container hidden">

<button onclick="tornaMenu()">⬅ INDIETRO</button>

<h2>Filamenti</h2>

</div>


<div id="storico" class="container hidden">

<button onclick="tornaMenu()">⬅ INDIETRO</button>

<h2>Storico stampe</h2>

</div>


<script src="script.js"></script>

</body>

</html>
